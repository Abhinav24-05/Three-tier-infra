name: CI

on:
  push:
    branches: [ main ]

jobs:
  build-and-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build and push image
        run: |
          chmod +x scripts/build-and-push.sh
          ./scripts/build-and-push.sh ${{ secrets.ECR_REPO_URI }} ${GITHUB_SHA::8}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform fmt
        run: terraform -chdir=infra/terraform fmt -check

      - name: Terraform init
        run: terraform -chdir=infra/terraform init -input=false

      - name: Terraform plan
        run: terraform -chdir=infra/terraform plan -var-file=infra/terraform/envs/dev.tfvars -input=false
